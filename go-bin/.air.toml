root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/go-bin ./cmd/server"
  bin = "./tmp/go-bin"
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "air-build.log"
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
